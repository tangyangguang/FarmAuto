      <div><div class="brand">Esp32FarmFeeder</div><div class="subtle">三路喂食器</div></div>
      <nav class="nav-section">
        <a class="nav-link" href="feeder-dashboard.html">首页</a>

      <section class="section">
        <div class="section-header"><h2>饲料桶</h2></div>
        <div class="section-body">
          <table class="data-table">
            <thead><tr><th>通道</th><th>满桶容量</th><th>当前估算余量</th><th>低余量阈值</th><th>可投喂次数</th><th>预计剩余天数</th><th>操作</th></tr></thead>
            <tbody>
              <tr><td data-label="通道">1</td><td data-label="满桶容量">5kg</td><td data-label="当前估算余量">4.1kg</td><td data-label="低余量阈值">20%</td><td data-label="可投喂次数">约 58 次</td><td data-label="预计剩余天数">约 19 天</td><td data-label="操作"><a class="button" href="feeder-bucket-refill.html">补料…</a></td></tr>
              <tr><td data-label="通道">2</td><td data-label="满桶容量">5kg</td><td data-label="当前估算余量">3.0kg</td><td data-label="低余量阈值">20%</td><td data-label="可投喂次数">约 44 次</td><td data-label="预计剩余天数">约 14 天</td><td data-label="操作"><a class="button" href="feeder-bucket-refill.html">补料…</a></td></tr>
              <tr><td data-label="通道">3</td><td data-label="满桶容量">3kg</td><td data-label="当前估算余量">0.5kg</td><td data-label="低余量阈值">20%</td><td data-label="可投喂次数">约 7 次</td><td data-label="预计剩余天数">约 2 天</td><td data-label="操作"><a class="button" href="feeder-bucket-refill.html">补料…</a></td></tr>
            </tbody>
          </table>
        </div>
      </section>
      <div class="page-note">下一阶段如果只需要“快没料”告警，优先评估红外/光电/电容点位检测；称重只作为连续余量估算方案。</div>
