<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmDoor 诊断</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Esp32FarmDoor</div>
      <nav class="nav-section">
        <a class="nav-link" href="farmdoor-dashboard.html">首页</a>
        <a class="nav-link" href="farmdoor-maintenance.html">维护</a>
        <a class="nav-link" href="farmdoor-records.html">业务记录</a>
        <a class="nav-link active" href="farmdoor-diagnostics.html">诊断</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div class="title-block"><h1>诊断</h1><div class="subtle">硬件摘要和业务诊断合并在这里。</div></div><a class="button" href="#base">Esp32Base 系统日志</a></div>
      <section class="section">
        <div class="section-header"><h2>硬件与存储</h2></div>
        <div class="section-body">
          <div class="metric-grid">
            <div class="metric"><div class="metric-label">AT24C</div><div class="metric-value">在线</div></div>
            <div class="metric"><div class="metric-label">AT24C 寿命估算</div><div class="metric-value">2%</div></div>
            <div class="metric"><div class="metric-label">Flash 剩余</div><div class="metric-value">42%</div></div>
            <div class="metric"><div class="metric-label">Flash 写入健康</div><div class="metric-value">正常</div></div>
          </div>
        </div>
      </section>
      <section class="section">
        <div class="section-header"><h2>设备诊断</h2></div>
        <div class="section-body">
          <table class="data-table">
            <tbody>
              <tr><td data-label="项目">电机</td><td data-label="值">待机 / 输出 0%</td></tr>
              <tr><td data-label="项目">电流</td><td data-label="值">320mA / 滤波后 315mA / 阈值 2500mA</td></tr>
              <tr><td data-label="项目">限位</td><td data-label="值">首版未安装</td></tr>
              <tr><td data-label="项目">最近保护停止</td><td data-label="值">0</td></tr>
            </tbody>
          </table>
        </div>
      </section>
      <section id="base" class="page-note">系统日志、WiFi、OTA、系统工具仍进入 Esp32Base 页面。</section>
    </main>
  </div>
</body>
</html>
