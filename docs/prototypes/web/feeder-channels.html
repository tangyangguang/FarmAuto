<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmFeeder 基础信息</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div><div class="brand">Esp32FarmFeeder</div><div class="subtle">三路喂食器</div></div>
      <nav class="nav-section">
        <a class="nav-link" href="feeder-dashboard.html">首页</a>
        <a class="nav-link" href="feeder-schedule.html">计划</a>
        <a class="nav-link" href="feeder-records.html">记录</a>
        <a class="nav-link active" href="feeder-channels.html">基础信息</a>
        <a class="nav-link" href="feeder-diagnostics.html">诊断</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div class="title-block"><h1>基础信息</h1><div class="subtle">一个通道对应一个下料器和一个饲料桶；本页只维护低频业务基础配置。</div></div></div>
      <section class="section">
        <div class="section-header"><h2>通道基础信息</h2><span class="subtle">低频配置，一次只修改一个通道</span></div>
        <div class="section-body">
          <table class="data-table">
            <thead><tr><th>通道</th><th>名称</th><th>启用</th><th>每圈信号数</th><th>每圈克数</th><th>料桶容量</th><th>换算示例</th><th>操作</th></tr></thead>
            <tbody>
              <tr><td data-label="通道">1</td><td data-label="名称">东侧料桶</td><td data-label="启用"><span class="pill ok">启用</span></td><td data-label="每圈信号数">4320</td><td data-label="每圈克数">70.0 克</td><td data-label="料桶容量">5.0 kg</td><td data-label="换算示例">70g = 1.00 圈</td><td data-label="操作"><a class="button primary" href="feeder-channel-edit.html">编辑</a></td></tr>
              <tr><td data-label="通道">2</td><td data-label="名称">中间料桶</td><td data-label="启用"><span class="pill ok">启用</span></td><td data-label="每圈信号数">4320</td><td data-label="每圈克数">68.0 克</td><td data-label="料桶容量">5.0 kg</td><td data-label="换算示例">70g ≈ 1.03 圈</td><td data-label="操作"><a class="button" href="feeder-channel-edit.html">编辑</a></td></tr>
              <tr><td data-label="通道">3</td><td data-label="名称">西侧料桶</td><td data-label="启用"><span class="pill warn">停用</span></td><td data-label="每圈信号数">4320</td><td data-label="每圈克数">70.0 克</td><td data-label="料桶容量">3.0 kg</td><td data-label="换算示例">停用时不参与计划</td><td data-label="操作"><a class="button" href="feeder-channel-edit.html">编辑</a></td></tr>
            </tbody>
          </table>
          <div class="page-note">当前估算余量属于运行状态，已放到首页“料桶余量”中维护；本页只负责通道名称、启用状态、信号数、每圈克数和料桶容量。</div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
