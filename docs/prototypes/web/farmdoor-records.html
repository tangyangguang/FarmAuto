<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmDoor 记录</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Esp32FarmDoor</div>
      <nav class="nav-section">
        <a class="nav-link" href="farmdoor-dashboard.html">首页</a>
        <a class="nav-link" href="farmdoor-maintenance.html">行程校准</a>
        <a class="nav-link active" href="farmdoor-records.html">记录</a>
        <a class="nav-link" href="farmdoor-diagnostics.html">诊断</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div class="title-block"><h1>记录</h1><div class="subtle">业务原始记录分页查看，导出后续增强。</div></div></div>
      <section class="section">
        <div class="section-header"><h2>记录</h2><span class="subtle">共 1,052 条</span></div>
        <div class="section-body">
          <div class="form-grid">
            <div class="field"><label>开始日期</label><input class="input" type="date" value="2026-05-01"></div>
            <div class="field"><label>结束日期</label><input class="input" type="date" value="2026-05-15"></div>
            <div class="field"><label>每页</label><select class="select"><option>50 条</option><option>100 条</option><option>200 条</option></select></div>
            <div class="field"><label>事件类型</label><select class="select"><option>全部原始记录</option><option>开门</option><option>关门</option><option>保护停止</option><option>故障</option></select></div>
            <div class="field"><label>结果</label><select class="select"><option>全部</option><option>正常</option><option>告警</option><option>故障</option></select></div>
            <div class="field"><label>&nbsp;</label><button class="button primary">查询</button></div>
          </div>
          <table class="data-table">
            <thead><tr><th>序号</th><th>时间</th><th>事件</th><th>结果</th><th>原始字段</th></tr></thead>
            <tbody>
              <tr><td data-label="序号">1052</td><td data-label="时间">08:01</td><td data-label="事件">关门完成</td><td data-label="结果">正常</td><td data-label="原始字段">脉冲=20960，耗时=17900ms</td></tr>
              <tr><td data-label="序号">1051</td><td data-label="时间">02:13</td><td data-label="事件">断电恢复</td><td data-label="结果">可信</td><td data-label="原始字段">来源=检查点，序号=884</td></tr>
            </tbody>
          </table>
          <div class="pagination">
            <span class="subtle">第 1 页 / 共 22 页</span>
            <div class="pagination-controls">
              <button class="button" disabled>上一页</button>
              <button class="page-number active">1</button>
              <button class="page-number">2</button>
              <button class="page-number">3</button>
              <button class="button">下一页</button>
              <input class="input compact-input" value="1">
              <button class="button">跳转</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
