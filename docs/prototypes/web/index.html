<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FarmAuto Web 原型</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="content">
    <div class="topbar">
      <div class="title-block">
        <h1>FarmAuto Web 原型</h1>
        <div class="subtle">静态页面，仅用于确认页面结构和交互内容，不代表固件实现。</div>
      </div>
      <div class="status-strip">
        <span class="pill ok">文档阶段</span>
        <span class="pill warn">非应用代码</span>
      </div>
    </div>

    <div class="page-note">
      确认完这些业务页面后，再进入架构编码。基础库自带能力不在本原型中制作，本目录只保留自动门和喂食器业务页面。
    </div>

    <section class="prototype-grid">
      <article class="prototype-tile">
        <h2>Esp32FarmDoor</h2>
        <p>自动门页面原型：状态控制、行程校准、记录、诊断摘要。</p>
        <div class="actions">
          <a class="button primary" href="farmdoor-dashboard.html">自动门首页</a>
          <a class="button" href="esp32-farmdoor.html">页面列表</a>
        </div>
      </article>
      <article class="prototype-tile">
        <h2>Esp32FarmFeeder</h2>
        <p>喂食器页面原型：三路状态、投喂计划、饲料桶、标定、记录、诊断。</p>
        <div class="actions">
          <a class="button primary" href="feeder-dashboard.html">喂食器首页</a>
          <a class="button" href="esp32-farmfeeder.html">页面列表</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
