<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmFeeder 页面入口</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="content">
    <div class="topbar">
      <div class="title-block">
        <h1>Esp32FarmFeeder 页面入口</h1>
        <div class="subtle">已拆成独立页面，后续请逐页确认。</div>
      </div>
      <a class="button" href="index.html">返回原型首页</a>
    </div>
    <section class="prototype-grid">
      <article class="prototype-tile"><h2>首页</h2><p>三路状态、正在下料、常用控制。</p><a class="button primary" href="feeder-dashboard.html">打开</a></article>
      <article class="prototype-tile"><h2>每日计划</h2><p>每日计划、参与通道、目标量。</p><a class="button primary" href="feeder-schedule.html">打开</a></article>
      <article class="prototype-tile"><h2>编辑计划</h2><p>新增或修改单个投喂计划。</p><a class="button primary" href="feeder-schedule-edit.html">打开</a></article>
      <article class="prototype-tile"><h2>饲料桶</h2><p>饲料桶容量、估算余量、补料。</p><a class="button primary" href="feeder-buckets.html">打开</a></article>
      <article class="prototype-tile"><h2>补料</h2><p>记录加料、设置余量或标记满桶。</p><a class="button primary" href="feeder-bucket-refill.html">打开</a></article>
      <article class="prototype-tile"><h2>下料标定</h2><p>手工输入每圈下料克数。</p><a class="button primary" href="feeder-calibration.html">打开</a></article>
      <article class="prototype-tile"><h2>维护</h2><p>单路试运行、清空今日、清除故障。</p><a class="button primary" href="feeder-maintenance.html">打开</a></article>
      <article class="prototype-tile"><h2>操作确认</h2><p>重新投喂、跳过今日和危险操作确认。</p><a class="button primary" href="feeder-confirm.html">打开</a></article>
      <article class="prototype-tile"><h2>记录</h2><p>业务原始记录分页查看。</p><a class="button primary" href="feeder-records.html">打开</a></article>
      <article class="prototype-tile"><h2>诊断</h2><p>硬件、存储、通道和错误诊断。</p><a class="button primary" href="feeder-diagnostics.html">打开</a></article>
    </section>
  </main>
</body>
</html>
