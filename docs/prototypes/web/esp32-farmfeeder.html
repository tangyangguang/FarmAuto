</head>
<body>
  <main class="content">
    <div class="topbar">
      <div class="title-block">
        <h1>Esp32FarmFeeder 页面入口</h1>
        <div class="subtle">已拆成独立页面，后续请逐页确认。</div>
      </div>
      <a class="button" href="index.html">返回原型首页</a>
    </div>
    <section class="prototype-grid">
      <article class="prototype-tile"><h2>首页</h2><p>三路运行状态、计划/手动下料来源、所选通道手动下料。</p><a class="button primary" href="feeder-dashboard.html">打开</a></article>
      <article class="prototype-tile"><h2>计划</h2><p>今日计划、明日计划和长期计划管理。</p><a class="button primary" href="feeder-schedule.html">打开</a></article>

      <article class="prototype-tile"><h2>诊断</h2><p>业务健康摘要、通道故障和只读检查。</p><a class="button primary" href="feeder-diagnostics.html">打开</a></article>
