<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmFeeder 每日计划</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Esp32FarmFeeder</div>
      <nav class="nav-section">
        <a class="nav-link" href="feeder-dashboard.html">首页</a>
        <a class="nav-link active" href="feeder-schedule.html">每日计划</a>
        <a class="nav-link" href="feeder-buckets.html">饲料桶</a>
        <a class="nav-link" href="feeder-calibration.html">下料标定</a>
        <a class="nav-link" href="feeder-records.html">业务记录</a>
        <a class="nav-link" href="feeder-diagnostics.html">诊断</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div class="title-block"><h1>每日计划</h1><div class="subtle">支持一天多个计划。每个计划独立设置时间、参与通道和每路投喂量。</div></div><span class="pill">默认无计划</span></div>
      <section class="section">
        <div class="section-header"><h2>计划列表</h2><button class="button primary">新增计划</button></div>
        <div class="section-body">
          <table class="data-table">
            <thead><tr><th>启用</th><th>时间</th><th>通道 1</th><th>通道 2</th><th>通道 3</th><th>今日状态</th><th>操作</th></tr></thead>
            <tbody>
              <tr><td data-label="启用">是</td><td data-label="时间">07:30</td><td data-label="通道 1">70g</td><td data-label="通道 2">1.00 圈</td><td data-label="通道 3">70g</td><td data-label="今日状态">已中断</td><td data-label="操作"><button class="button">编辑</button></td></tr>
              <tr><td data-label="启用">是</td><td data-label="时间">12:30</td><td data-label="通道 1">50g</td><td data-label="通道 2">50g</td><td data-label="通道 3">不参与</td><td data-label="今日状态">待执行</td><td data-label="操作"><button class="button">编辑</button></td></tr>
              <tr><td data-label="启用">否</td><td data-label="时间">17:30</td><td data-label="通道 1">70g</td><td data-label="通道 2">70g</td><td data-label="通道 3">70g</td><td data-label="今日状态">未启用</td><td data-label="操作"><button class="button">编辑</button></td></tr>
            </tbody>
          </table>
        </div>
      </section>
      <section class="section">
        <div class="section-header"><h2>编辑计划示例</h2></div>
        <div class="section-body">
          <div class="form-grid">
            <div class="field"><label>执行时间</label><input class="input" value="12:30"></div>
            <div class="field"><label>跳过今日</label><select class="select"><option>否</option><option>是</option></select></div>
            <div class="field"><label>通道 1</label><input class="input" value="参与，50g"></div>
            <div class="field"><label>通道 2</label><input class="input" value="参与，50g"></div>
            <div class="field"><label>通道 3</label><input class="input" value="不参与"></div>
          </div>
          <div class="actions"><button class="button primary">保存计划</button><button class="button danger">删除计划</button></div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
