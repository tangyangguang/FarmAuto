<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32Base OTA / 无线网络</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="content">
    <div class="topbar">
      <div class="title-block">
        <h1>Esp32Base OTA / 无线网络</h1>
        <div class="subtle">占位原型：实际网络和升级能力由 Esp32Base 提供。</div>
      </div>
      <a class="button" href="index.html">返回原型首页</a>
    </div>
    <section class="section">
      <div class="section-header"><h2>系统状态</h2></div>
      <div class="section-body">
        <div class="metric-grid">
          <div class="metric"><div class="metric-label">无线网络</div><div class="metric-value">已连接</div></div>
          <div class="metric"><div class="metric-label">信号强度</div><div class="metric-value">-61 dBm</div></div>
          <div class="metric"><div class="metric-label">OTA</div><div class="metric-value">可用</div></div>
          <div class="metric"><div class="metric-label">固件版本</div><div class="metric-value">原型</div></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
