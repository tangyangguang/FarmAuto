<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32Base 系统参数</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="content">
    <div class="topbar">
      <div class="title-block">
        <h1>Esp32Base 系统参数</h1>
        <div class="subtle">占位原型：实际页面由 Esp32Base 内置 App Config 提供。</div>
      </div>
      <a class="button" href="index.html">返回原型首页</a>
    </div>
    <section class="section">
      <div class="section-header"><h2>自动门行程与保护参数示例</h2></div>
      <div class="section-body">
        <div class="form-grid">
          <div class="field"><label>开门目标圈数</label><div class="input-with-unit"><input class="input" type="number" step="0.01" value="5.00"><span class="input-unit">圈</span></div></div>
          <div class="field"><label>保护最大圈数</label><div class="input-with-unit"><input class="input" type="number" step="0.01" value="7.50"><span class="input-unit">圈</span></div></div>
          <div class="field"><label>保护最大时长</label><div class="input-with-unit"><input class="input" type="number" step="1" value="25"><span class="input-unit">秒</span></div></div>
          <div class="field"><label>电机速度</label><div class="input-with-unit"><input class="input" type="number" min="10" max="100" step="5" value="80"><span class="input-unit">%</span></div></div>
        </div>
        <div class="actions"><button class="button primary">保存系统参数</button></div>
      </div>
    </section>
    <section class="page-note">本页面只用于静态原型核对链接和边界，不代表 FarmAuto 自己实现系统参数页面。</section>
  </main>
</body>
</html>
