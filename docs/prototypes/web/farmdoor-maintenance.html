<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmDoor 行程校准</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div><div class="brand">Esp32FarmDoor</div><div class="subtle">自动门</div></div>
      <nav class="nav-section">
        <a class="nav-link" href="farmdoor-dashboard.html">首页</a>
        <a class="nav-link active" href="farmdoor-maintenance.html">行程校准</a>
        <a class="nav-link" href="farmdoor-records.html">记录</a>
        <a class="nav-link" href="farmdoor-diagnostics.html">诊断</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div class="title-block"><h1>行程校准</h1><div class="subtle">手动运行电机，并用当前位置生成或更新开门目标。</div></div><span class="pill warn">危险操作需确认</span></div>
      <div class="alert">第一版无限位时，需要远程观察或机械标记辅助。保存关门基准和更新开门目标必须二次确认。</div>
      <section class="section">
        <div class="section-header"><h2>手动运行与端点标定</h2><span class="subtle">按指定圈数调整门的位置</span></div>
        <div class="section-body">
          <div class="metric-grid">
            <div class="metric"><div class="metric-label">当前位置</div><div class="metric-value">0.00 圈</div></div>
            <div class="metric"><div class="metric-label">当前开门目标</div><div class="metric-value">5.00 圈</div></div>
            <div class="metric"><div class="metric-label">每圈信号数</div><div class="metric-value">4320</div></div>
            <div class="metric"><div class="metric-label">运行状态</div><div class="metric-value">待机</div></div>
          </div>
          <div class="form-grid">
            <div class="field">
              <label>本次转动圈数</label>
              <div class="input-with-unit"><input class="input" type="number" min="0.05" max="10" step="0.05" value="0.25"><span class="input-unit">圈</span></div>
            </div>
            <div class="field">
              <label>速度百分比</label>
              <div class="range-row"><input class="range" type="range" min="10" max="100" value="30"><input class="input compact-input" type="number" min="10" max="100" step="5" value="30"></div>
            </div>
          </div>
          <div class="actions">
            <button class="button">向开门方向运行</button>
            <button class="button">向关门方向运行</button>
            <button class="button danger">立即停止</button>
            <a class="button" href="farmdoor-confirm.html">把当前位置标为关门基准（清零）…</a>
            <a class="button primary" href="farmdoor-confirm.html">用当前位置更新开门目标…</a>
          </div>
          <div class="page-note">这里用于远程调整门板位置并保存关门基准或开门目标。电机速度、保护上限等低频参数由基础库配置页面管理，本业务页不重复做参数入口。</div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
