<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmDoor Maintenance</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Esp32FarmDoor</div>
      <nav class="nav-section">
        <a class="nav-link" href="farmdoor-dashboard.html">Dashboard</a>
        <a class="nav-link active" href="farmdoor-maintenance.html">Maintenance</a>
        <a class="nav-link" href="farmdoor-records.html">Records</a>
        <a class="nav-link" href="farmdoor-diagnostics.html">Diagnostics</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div class="title-block"><h1>Maintenance</h1><div class="subtle">端点维护、点动和行程设置。</div></div><span class="pill warn">confirm token</span></div>
      <div class="alert warn">第一版无限位时，需要远程观察或机械标记辅助。危险操作必须二次确认。</div>
      <section class="section">
        <div class="section-header"><h2>低速点动</h2></div>
        <div class="section-body actions">
          <button class="button">开门方向点动</button>
          <button class="button">关门方向点动</button>
          <button class="button danger">停止</button>
        </div>
      </section>
      <section class="section">
        <div class="section-header"><h2>行程和端点</h2></div>
        <div class="section-body">
          <div class="form-grid">
            <div class="field"><label>开门目标</label><input class="input" value="5.00 圈"></div>
            <div class="field"><label>最大运行</label><input class="input" value="7.50 圈"></div>
            <div class="field"><label>最大时长</label><input class="input" value="25 秒"></div>
            <div class="field"><label>微调步长</label><select class="select"><option>0.10 圈</option><option>0.25 圈</option></select></div>
          </div>
          <div class="actions">
            <button class="button">设置当前位置为关闭点</button>
            <button class="button">保存当前位置为开门目标</button>
            <button class="button primary">低速验证端点</button>
          </div>
        </div>
      </section>
      <section class="section">
        <div class="section-header"><h2>电流和存储维护</h2></div>
        <div class="section-body actions">
          <button class="button">INA240A2 零点校准</button>
          <button class="button">AT24C 检查</button>
          <button class="button">Flash 检查</button>
          <button class="button danger">格式化业务存储</button>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
