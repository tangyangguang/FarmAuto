<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmFeeder 诊断</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Esp32FarmFeeder</div>
      <nav class="nav-section">
        <a class="nav-link" href="feeder-dashboard.html">首页</a>
        <a class="nav-link" href="feeder-schedule.html">每日计划</a>
        <a class="nav-link" href="feeder-buckets.html">饲料桶</a>
        <a class="nav-link" href="feeder-calibration.html">下料标定</a>
        <a class="nav-link" href="feeder-records.html">业务记录</a>
        <a class="nav-link active" href="feeder-diagnostics.html">诊断</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div class="title-block"><h1>诊断</h1><div class="subtle">喂食器也需要硬件、存储和业务诊断。</div></div><a class="button" href="#base">Esp32Base 系统日志</a></div>
      <section class="section">
        <div class="section-header"><h2>硬件与存储</h2></div>
        <div class="section-body">
          <div class="metric-grid">
            <div class="metric"><div class="metric-label">AT24C</div><div class="metric-value">在线</div></div>
            <div class="metric"><div class="metric-label">AT24C 寿命估算</div><div class="metric-value">3%</div></div>
            <div class="metric"><div class="metric-label">Flash 剩余</div><div class="metric-value">28%</div></div>
            <div class="metric"><div class="metric-label">Flash 写入健康</div><div class="metric-value">告警</div></div>
          </div>
        </div>
      </section>
      <section class="section">
        <div class="section-header"><h2>通道诊断</h2></div>
        <div class="section-body">
          <table class="data-table">
            <thead><tr><th>通道</th><th>电机</th><th>编码器</th><th>电流</th><th>最近故障</th></tr></thead>
            <tbody>
              <tr><td data-label="通道">1</td><td data-label="电机">待机</td><td data-label="编码器">正常</td><td data-label="电流">未安装</td><td data-label="最近故障">断电中断</td></tr>
              <tr><td data-label="通道">2</td><td data-label="电机">下料中</td><td data-label="编码器">正在计数</td><td data-label="电流">未安装</td><td data-label="最近故障">无</td></tr>
              <tr><td data-label="通道">3</td><td data-label="电机">故障</td><td data-label="编码器">无脉冲</td><td data-label="电流">未安装</td><td data-label="最近故障">无编码器脉冲</td></tr>
            </tbody>
          </table>
        </div>
      </section>
      <section id="base" class="page-note">系统日志、WiFi、OTA、系统工具仍进入 Esp32Base 页面。业务诊断和业务记录留在应用页面。</section>
    </main>
  </div>
</body>
</html>
