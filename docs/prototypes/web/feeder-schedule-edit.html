<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmFeeder 编辑计划</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div><div class="brand">Esp32FarmFeeder</div><div class="subtle">三路喂食器</div></div>
      <nav class="nav-section">
        <a class="nav-link" href="feeder-dashboard.html">首页</a>
        <a class="nav-link active" href="feeder-schedule.html">计划</a>
        <a class="nav-link" href="feeder-channels.html">通道</a>
        <a class="nav-link" href="feeder-records.html">记录</a>
        <a class="nav-link" href="feeder-diagnostics.html">诊断</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar">
        <div class="title-block"><h1>编辑计划</h1><div class="subtle">每个计划独立设置时间、参与通道和每路下料量。</div></div>
        <a class="button" href="feeder-schedule.html">返回计划列表</a>
      </div>
      <section class="section">
        <div class="section-header"><h2>基础设置</h2><span class="pill ok">今日待执行</span></div>
        <div class="section-body">
          <div class="form-grid">
            <div class="field"><label>启用计划</label><select class="select"><option>启用</option><option>关闭</option></select></div>
            <div class="field"><label>执行时间</label><input class="input" type="time" value="12:30"></div>
            <div class="field"><label>跳过今日</label><select class="select"><option>否</option><option>是</option></select></div>
            <div class="field"><label>计划名称</label><input class="input" value="中午补喂"></div>
          </div>
        </div>
      </section>
      <section class="section">
        <div class="section-header"><h2>每路下料量</h2></div>
        <div class="section-body">
          <div class="alert">通道 3 当前未启用本计划。未标定通道不能保存克数目标。</div>
          <table class="data-table">
            <thead><tr><th>通道</th><th>是否参与</th><th>主目标</th><th>换算值</th><th>标定状态</th></tr></thead>
            <tbody>
              <tr><td data-label="通道">1</td><td data-label="是否参与"><select class="select"><option>参与</option><option>不参与</option></select></td><td data-label="主目标"><div class="input-with-unit"><input class="input" type="number" min="0" step="0.1" value="50"><span class="input-unit">克</span></div></td><td data-label="换算值">≈ 0.71 圈</td><td data-label="标定状态">70g/圈</td></tr>
              <tr><td data-label="通道">2</td><td data-label="是否参与"><select class="select"><option>参与</option><option>不参与</option></select></td><td data-label="主目标"><div class="input-with-unit"><input class="input" type="number" min="0" step="0.01" value="1.00"><span class="input-unit">圈</span></div></td><td data-label="换算值">≈ 68g</td><td data-label="标定状态">68g/圈</td></tr>
              <tr><td data-label="通道">3</td><td data-label="是否参与"><select class="select"><option>不参与</option><option>参与</option></select></td><td data-label="主目标"><div class="input-with-unit"><input class="input" type="number" min="0" step="0.1" value="0"><span class="input-unit">克</span></div></td><td data-label="换算值">未参与</td><td data-label="标定状态"><span class="pill warn">未参与</span></td></tr>
            </tbody>
          </table>
          <div class="alert danger">保存失败示意：通道 2 的目标超过本次允许范围，请调整后重试。</div>
          <div class="actions">
            <button class="button primary">保存计划</button>
            <a class="button danger" href="feeder-confirm.html">删除计划…</a>
            <a class="button" href="feeder-schedule.html">取消</a>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
