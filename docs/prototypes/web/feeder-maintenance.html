<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esp32FarmFeeder 维护</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div><div class="brand">Esp32FarmFeeder</div><div class="subtle">三路喂食器</div></div>
      <nav class="nav-section">
        <a class="nav-link" href="feeder-dashboard.html">首页</a>
        <a class="nav-link" href="feeder-schedule.html">每日计划</a>
        <a class="nav-link" href="feeder-buckets.html">饲料桶</a>
        <a class="nav-link" href="feeder-calibration.html">下料标定</a>
        <a class="nav-link active" href="feeder-maintenance.html">维护</a>
        <a class="nav-link" href="feeder-records.html">记录</a>
        <a class="nav-link" href="feeder-diagnostics.html">诊断</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div class="title-block"><h1>维护</h1><div class="subtle">通道试运行、今日计数和故障处理。</div></div><span class="pill warn">部分操作需确认</span></div>
      <section class="section">
        <div class="section-header"><h2>单路试运行</h2><span class="subtle">用于维护检查，不改变每日计划</span></div>
        <div class="section-body">
          <div class="form-grid">
            <div class="field"><label>通道</label><select class="select"><option>通道 1</option><option>通道 2</option><option>通道 3</option></select></div>
            <div class="field"><label>运行目标</label><div class="input-with-unit"><input class="input" type="number" min="0.05" step="0.05" value="0.10"><span class="input-unit">圈</span></div></div>
          </div>
          <div class="actions"><a class="button primary" href="feeder-confirm.html">启动试运行…</a><button class="button danger">停止全部</button></div>
        </div>
      </section>
      <section class="section">
        <div class="section-header"><h2>今日状态维护</h2></div>
        <div class="section-body actions">
          <a class="button" href="feeder-confirm.html">清空今日计数…</a>
          <a class="button" href="feeder-confirm.html">清除通道故障…</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
